<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
  </head>
  <body>
    <header id="header"></header>
    
    <main>
      <div class="game-container">
        <!-- Player Side -->
        <div id="playerShips" class="ship-status player-side"></div>

        <!-- Boards Container -->
        <div class="boards-wrapper">
          <div id="playerBoardContainer" class="board-section">
            <h2>Your Board</h2>
            <div id="playerGrid" class="game-grid"></div>
          </div>

          <div id="opponentBoardContainer" class="board-section">
            <h2>Opponent Board</h2>
            <div id="opponentGrid" class="game-grid"></div>
          </div>
        </div>

        <!-- Opponent Side -->
        <div id="opponentShips" class="ship-status opponent-side"></div>
      </div>

      <!-- Instructions and Start Game -->
      <div class="bottom-section">
        <div id="instructionsSection" class="instructions-section placement-only">
          <h3>Placement Phase</h3>
          <ul>
            <li><strong>Click</strong> a ship to select it</li>
            <li><strong>Click</strong> a cell to move ship there</li>
            <li><strong>Press R</strong> to rotate selected ship</li>
          </ul>
        </div>

        <div id="startGameSection" class="start-game-section placement-only">
          <button id="startGameBtn" class="start-btn">Start Game</button>
        </div>
      </div>
    </main>
  </body>
</html>
